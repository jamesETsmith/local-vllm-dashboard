name: glm_5_2_mxfp4-mi355x-from-b300-no-profile
gpu: MI355X
num_gpus: 4
nightly: false

vllm:
  model: amd/GLM-5.2-MXFP4
  image: vllm-openai-rocm:v0.25.1-aiter-latest
  env:
    VLLM_ROCM_USE_AITER: 1
    VLLM_ROCM_USE_AITER_FP8BMM: 0
    VLLM_ROCM_USE_AITER_FP4BMM: 0
    AITER_ONLINE_TUNE: 1
    VLLM_ROCM_USE_AITER_FUSION_SHARED_EXPERTS: 1
  serve_args: >-
    --tensor-parallel-size 4
    --quantization quark
    --trust-remote-code
    --reasoning-parser glm45
    --tool-call-parser glm47
    --enable-auto-tool-choice
    --kv-cache-dtype fp8
    --enable-prefix-caching
    --max-model-len 65536
    --gpu-memory-utilization 0.95

vllm_bench:
  metadata:
    device: mi355x
    tp: 4
    precision: mxfp4
    workload: 50k-in-1k-out-40k-cached
  configs:
    - name: 50k-in-1k-out-40k-cached-conc-4
      backend: openai
      dataset: prefix_repetition
      input_len: 50000
      output_len: 1000
      num_prompts: 40
      max_concurrency: 4
      args:
        num_warmups: 32
        percentile_metrics: ttft,tpot,itl,e2el
        prefix_repetition_num_prefixes: 1
        prefix_repetition_prefix_len: 40000
        prefix_repetition_suffix_len: 10000
        prefix_repetition_output_len: 1000
        disable_tqdm: true
