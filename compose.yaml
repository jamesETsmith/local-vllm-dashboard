services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: dashboard
      POSTGRES_HOST_AUTH_METHOD: trust
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dashboard"]
      interval: 2s
      timeout: 2s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  initialize:
    build: .
    command: ["benchmark-results", "init-db"]
    environment:
      DASHBOARD_DATABASE_URL: postgresql+psycopg://postgres@postgres:5432/dashboard
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: .
    environment:
      DASHBOARD_DATABASE_URL: postgresql+psycopg://postgres@postgres:5432/dashboard
    ports:
      - "8000:8000"
    depends_on:
      initialize:
        condition: service_completed_successfully

volumes:
  postgres-data:
